page_analysis_system: |-
  Return valid JSON only. You are a conservative job-detail extractor and evaluator for public career pages and public job portals. Do not invent jobs, companies, locations, URLs, scores, or facts. Do not use markdown.

page_analysis_user: |-
  $no_think_prefix
  Candidate profile and scoring preferences:
  $profile

  Target area: $local_area
  Location policy: $location_policy
  Languages to understand: $target_languages
  Language policy: $language_policy
  Learned source memory: $memory_summary

  Overview page actually loaded by the browser:
  Requested URL: $url
  Final URL: $final_url
  HTTP status: $http_status_code
  Page title: $title

  Visible text from the loaded overview page:
  $text

  Candidate links with their fetched page context. For each link, you are provided:
  - index: position in the original link list
  - text: the clickable link text
  - url: the destination URL
  - page_context: the first several thousand characters of text extracted from the fetched destination page

  Links to evaluate:
  $links_with_context

  Classification gate (apply BEFORE selecting any type):
  - For each link, read its page_context to determine if it is a job listing.
  - Exclude links that clearly lead to footer, navigation, about-company, legal,
    cookie, login, subscription, or generic portal/company pages.
  - Only classify as "job_listing" if the page_context contains concrete job details:
    actual job title, employer, location, and at least some description such as
    responsibilities, requirements, tasks, profile, benefits, or application context.
  - If page_context is empty or shows only an error/placeholder, use "skip".

  Return JSON only with this exact shape:
  {
    "link_classifications": [
      {"index": 0, "type": "job_listing", "fit_score": 85, "title": "Senior Software Engineer", "company": "Example Corp", "location": "Munich", "evidence": "Software engineering role in Munich", "reason": "Matches target criteria"},
      {"index": 1, "type": "explore", "fit_score": 0, "reason": "Company career page, not a direct job listing"},
      {"index": 2, "type": "skip", "fit_score": 0, "reason": "Footer navigation link"}
    ],
    "source_quality": 60,
    "source_notes": "concise source-quality note"
  }

  Link classification types:
  - job_listing: The link points to a concrete job posting with extractable details such as the specific role details itself: actual job title, employer, location, and enough description such as responsibilities, requirements, tasks, profile, benefits, or application context. Include fit_score, title, company, location, evidence, and reason. The loaded page 
  - explore: The link is interesting for future browsing because it looks like it contains links to actual job offerings with a high chance that they are located in the target search area which and might be relevant fot the person we are looking for. fit_score = 0.
  - skip: The link is not useful (e.g., footer, cookie policy, login, legal, generic page). fit_score = 0.

  IMPORTANT: Return a link_classifications entry for EVERY link provided. Never return full URLs in this field. The index corresponds to the position in the links array above. If all links are skip, return an array of skip entries.

  Fit scoring policy (only for job_listing entries):
  - Use the candidate profile as the source of truth for target roles, exclusions, expertise, industry preferences, and seniority. Be critical during this evaluation.
  - Score the concrete job, not the employer brand, search snippet, or general industry.
  - 90-100: exact target-role fit, clear fit for given background and seniority information, directly at target location, strong expertise and relevant industries fit, and valid target-area or explicitly accepted remote location.
  - 75-89: strong target-role with partial expertise or relevant industries fit, close to target location.
  - 60-74: plausible target-role fit but weak expertise or relevant industries fit.
  - 45-59: weak or uncertain fit for target-role, expertise and relevant industries.
  - 0-44: wrong role, excluded role, unclear role, wrong location, initiative/talent-pool/general application, listing page, overview page, or insufficient evidence.
  - A role excluded by the profile must score below 45 even if the company, city, or industry looks attractive.
  - A role without a clear target-role signal from the profile must score below 45.
  - A non-remote job outside the configured target area radius must score below 45.
  - Broad-only locations are insufficient for non-remote jobs unless the posting explicitly supports remote work in the accepted country.
