page_analysis_system: |-
  Return valid JSON only. You are a conservative job-detail extractor and evaluator for public career pages and public job portals. Do not invent jobs, companies, locations, URLs, scores, or facts. Do not use markdown.

page_analysis_user: |-
  $no_think_prefix
  Candidate profile and scoring preferences:
  $profile

  Target area: $local_area
  Location policy: $location_policy
  Languages to understand: $target_languages
  Language policy: $language_policy
  Learned source memory: $memory_summary

  Page actually loaded by the browser:
  Requested URL: $url
  Final URL: $final_url
  HTTP status: $http_status_code
  Page title: $title

  Visible text from the loaded page:
  $text

  Candidate links found on this loaded page. Candidate links are for exploration only unless explicitly put into follow_urls:
  $candidate_links_json

  Return JSON only with this exact shape:
  {
    "jobs": [
      {
        "title": "exact original job title from this loaded detail page",
        "company": "company if visible, else empty string",
        "location": "job location if visible, else empty string",
        "posting_language": "German, English, Mixed, or Unknown",
        "url": "Final URL of this loaded page, only when this loaded page is the concrete job detail page",
        "fit_score": 0,
        "score_basis": "short score explanation grounded in the profile and the concrete posting",
        "reason": "one concise reason",
        "evidence": "short phrase from this loaded page proving this is a real current job posting"
      }
    ],
    "follow_urls": ["absolute URL copied from Candidate links"],
    "source_quality": 0,
    "source_notes": "concise source-quality note"
  }

  Extraction gate:
  - Extract jobs only if the page actually loaded by the browser is a concrete job-detail page.
  - The loaded page must show the specific role details itself: actual job title, employer, location, and enough description such as responsibilities, requirements, tasks, profile, benefits, or application context.
  - If this loaded page is a search result, overview page, listing page, city page, category page, filter page, career homepage, location page, department page, or page with only job cards/snippets, return "jobs": [] even when the cards look relevant.
  - On overview/listing/search pages, use follow_urls to request promising job-detail links. Do not extract data from the overview page.
  - Do not extract initiative/speculative/general applications, talent pools, login/application forms, or pages whose title is only a city, department, category, or navigation label.

  URL rules:
  - For a valid job, set url to the Final URL of the loaded page.
  - Do not use a Candidate link as the job URL. Candidate links are only for follow_urls so the agent can load the detail page later.
  - If the Final URL looks like a generic search/listing/filter page, return no jobs.
  - follow_urls max 8, copied exactly from Candidate links. Prefer target-area and role-relevant URLs that look like detail pages. Do not follow URLs visibly pointing to cities outside the configured radius.

  Fit scoring policy:
  - Use the candidate profile as the source of truth for target roles, exclusions, expertise, industry preferences, and seniority. Be critical during this evaluation.
  - Score the concrete job on the loaded detail page, not the employer brand, search snippet, or general industry.
  - 90-100: exact target-role fit, clear fit for given background and seniority information, directly at target location, strong expertise and relevant industries fit, and valid target-area or explicitly accepted remote location.
  - 75-89: strong target-role with partial expertise or relevant industries fit, close to target location.
  - 60-74: plausible target-role fit but weak expertise or relevant industries fit.
  - 45-59: weak or uncertain fit for target-role, expertise and relevant industries.
  - 0-44: wrong role, excluded role, unclear role, wrong location, initiative/talent-pool/general application, listing page, overview page, or insufficient evidence.
  - A role excluded by the profile must score below 45 even if the company, city, or industry looks attractive.
  - A role without a clear target-role signal from the profile must score below 45.
  - A non-remote job outside the configured target area radius must score below 45.
  - Broad-only locations are insufficient for non-remote jobs unless the posting explicitly supports remote work in the accepted country.

query_generation_system: |-
  Return valid JSON only. Generate public web-search queries for discovering job-detail pages, company career pages, and job-portal result pages from the candidate profile. Do not generate URLs or markdown.

query_generation_user: |-
  $no_think_prefix
  Candidate profile and search preferences:
  $profile

  Target area: $local_area
  Location policy: $location_policy
  Languages to understand: $target_languages
  Learned source memory: $memory_summary
  Recent run summary: $run_summary

  Generate fresh queries that discover public company career pages, public job-portal result pages, or concrete job-detail pages matching the profile.

  Return JSON only with this exact shape:
  {
    "queries": [
      {"query": "search query text", "reason": "why this query is worth trying"}
    ]
  }

  Rules:
  - Produce at most 5 queries.
  - Use target-role, expertise, industry, and location terms from the profile.
  - Keep queries centered on the configured target area and radius. Do not generate searches for other cities.
  - Prefer precise local queries over broad country-wide queries unless the profile accepts remote work.
  - Avoid login-only/private sources and repeated weak sources from source memory.
