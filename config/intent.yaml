# Personal / job-seeker-specific configuration for jobagent-local.
#
# This file contains everything that differs between job seekers.
# Role vocabulary goes in profile.md. Operational knobs go in config.yaml.
# If a different person wants to use this agent, they edit this file
# and profile.md; config.yaml stays unchanged.

# --- Location ---
location:
  # Human-readable target area used in prompts and logs.
  local_area: "Munich, Bavaria, Germany"

  # Languages to understand. Language itself is not scored positively or negatively.
  languages: [German, English]

# --- Companies ---
companies:
  # Drop matching jobs before persistence. Leave empty unless needed.
  blacklist:
    - Futrue GmbH
  # Companies to proactively search for. Randomly injected into ~50% of bootstrap queries.
  whitelist:
    - ZEISS
    - TRUMPF
    - Rohde & Schwarz
    - HENSOLDT
    - OSRAM
    - Airbus Defence & Space
    - Coherent
    - SUSS MicroTec
    - TOPTICA Photonics
    - Blickfeld
    - Marvel Fusion
    - BMW
    - Isar Aerospace
    - Rheinmetall
    - TYTAN
    - Helsing
    - Quantum Systems
    - Stark
    - KNDS
