# jobagent-local runtime configuration
#
# Put job-search intent in config/profile.md.
# Keep this YAML for operational behavior: model endpoint, crawl limits,
# search mode, radius, validation, memory, and logging.

app:
  # Output files. jobs.sqlite also stores source memory and crawl state.
  data_dir: data
  database_path: data/jobs.sqlite
  csv_export_path: data/jobs.csv
  jsonl_export_path: data/jobs.jsonl
  log_path: data/jobagent.log

  # Browser/crawler user-agent string.
  user_agent: JobMatchAgent/0.1 (+local personal job search; read-only)

target:
  # Languages to understand. Language itself is not scored positively or negatively.
  # Default is read from config/intent.yaml on startup.
  languages: []

  # Keep explicitly remote-from-Germany jobs even if no office is inside the radius.
  include_remote: true

  # Human-readable target area used in prompts and logs.
  # Default is read from config/intent.yaml on startup.
  local_area: ""

profile:
  # Single source of truth for roles, aliases, expertise, industries, and exclusions.
  path: config/profile.md

seeds:
  # Optional direct starting URLs: company career pages or job-board result pages.
  path: config/seeds.txt

prompts:
  # Generic LLM prompt templates. Target-role details come from profile.md.
  path: config/prompts.yaml

llm:
  # OpenAI-compatible llama.cpp endpoint.
  base_url: http://127.0.0.1:8087/v1

  # Model name sent to llama.cpp. Most local servers accept "local".
  model: local

  # Read timeout for one LLM request. 400s is useful for larger Qwen runs on CPU.
  timeout_seconds: 400

  # Short startup check so the crawler does not browse hundreds of pages while
  # the local model server is offline.
  health_check_timeout_seconds: 5

  # true means: verify the local LLM is reachable before opening pages.
  require_available_on_start: true

  # true means: stop the run if llama.cpp disappears mid-run instead of
  # continuing to enqueue irrelevant pages without LLM judgement.
  stop_run_on_connection_error: true

  # Low temperature keeps extraction and scoring consistent.
  temperature: 0.1

  # Set this to the context size configured in llama.cpp.
  context_window_tokens: 12000

  # Maximum output tokens. This includes thinking tokens when thinking_enabled is true.
  output_tokens: 5000

  # false is the safer default for strict JSON extraction. Set true only if you
  # want the model to spend more tokens reasoning and your server returns clean JSON.
  thinking_enabled: true

  # Ask servers that support JSON mode to return a JSON object.
  # The client retries once without this option if llama.cpp rejects it.
  response_format_type: json_object

browser:
  # Set false only for visual debugging.
  headless: true

run:
  # Clear the crawl queue at each start. This prevents stale frontier items from
  # an older mode/profile run from dragging the agent into irrelevant pages.
  # It does not delete jobs or learned source memory.
  reset_frontier_on_start: true

  # Maximum pages opened per run.
  max_pages: 500

  # Maximum link depth from seed/search pages.
  max_depth: 3

  # Delay between page visits. Kept below 1 second per your request.
  min_delay_seconds: 0.2
  max_delay_seconds: 0.8

  # Export partial results while the run is still active.
  export_after_each_page: true
  export_after_run: true
  export_on_interrupt: true

crawler:
  # false allows search result pages; true enforces robots.txt strictly.
  respect_robots_txt: false

  # Retry pages blocked in earlier runs if robots are now disabled.
  retry_previously_blocked_when_robots_disabled: true

  # Retry pages that failed in earlier runs.
  retry_error_pages: true

  # Maximum candidate links sent to the LLM per loaded page.
  max_links_per_page_for_llm: 80

  # Prevent one source from consuming the whole run.
  max_pages_per_source_key: 25

  # Domain-level career expansion can discover useful companies but broad
  # runs should not guess /careers on every linked domain. Keep this 0
  # unless you intentionally want domain expansion.
  max_career_domain_expansions_per_page: 0

matching:
  # Jobs below this final calibrated score are not saved.
  min_fit_score_to_save: 55

  # Used for source-memory rewards and final summaries.
  high_fit_score: 80

score_consistency:
  # The LLM may score jobs, but Python caps obviously inconsistent scores.
  enabled: true

  # A saved job must contain a target-role signal derived from profile.md.
  require_target_role_signal: true

  # Caps for inconsistent or uncertain LLM scores.
  no_target_role_cap: 34
  irrelevant_role_cap: 29
  avoid_term_cap: 39
  unclear_location_cap: 44

companies:
  # Drop exported jobs from these companies. Leave empty unless needed.
  # Default is read from config/intent.yaml on startup.
  blacklist: []

memory:
  # Stored in data/jobs.sqlite, table source_memory.
  # Higher source scores are opened earlier in future runs.
  initial_score: 50.0
  reward_job_found: 6.0
  reward_high_fit_job: 8.0
  penalty_no_job: -1.5
  penalty_error: -5.0
  blacklist_below_score: 8.0

exploration:
  # true lets the agent discover URLs beyond seeds.txt.
  enabled: true

  # If seeds.txt is empty, create profile-driven exploratory web-search URLs.
  seed_search_when_empty: true

  # Direct search endpoints for exploratory profile searches.
  # Avoid generic search engines by default because they frequently return 403
  # or CAPTCHA pages in unattended local runs.
  # Supported placeholders: {query} URL-encoded text, {query_slug} path-safe text.
  # Default is read from config/intent.yaml on startup.
  search_url_templates: []

  # For job-detail URLs, require the URL/link text to contain a profile-derived
  # target-role signal before spending an LLM call.
  require_role_signal_for_job_detail_urls: true

  # Apply the same role-signal filter to human-readable job URLs on company
  # career pages. Opaque ATS IDs can still be explored when no title is visible.
  require_role_signal_for_human_readable_company_job_urls: true

  # Drop detail-looking URLs that only contain profile exclusion terms, unless
  # they also contain a target-role signal.
  drop_avoid_only_job_detail_urls: true

  # If the LLM fails, do not let fallback link expansion grow the queue.
  max_follow_urls_without_llm: 0

  # LLM-generated exploratory queries during a run.
  max_generated_queries_per_run: 6
  query_generation_every_pages: 12

heuristic_extraction:
  # Disabled by default. The LLM does extraction and scoring.
  # Set enabled: true only if you want schema.org/job-link fallback extraction.
  enabled: false
  use_structured_data: true
  use_candidate_links: true
  max_jobs_per_page: 16

  # If heuristics are enabled, avoid saving weak job-link guesses from index pages.
  suppress_link_jobs_on_index_pages: true
  require_detail_url_for_link_jobs: true

job_validation:
  # Drops initiative applications, invented links, city-only titles, and index pages.
  enabled: true

  # Critical: save CSV rows only from the job-detail page that was actually loaded.
  # Overview/search/listing pages can only contribute follow URLs.
  require_loaded_job_detail_page: true

  # LLM URLs must be either the current page URL or a URL seen on the current page.
  enforce_llm_urls_from_page: true

  # The current page may be saved only if it looks like a concrete posting.
  allow_current_page_as_job_url: true
  current_page_url_must_look_like_detail: true

  # Prevent job-board city/filter/search pages from being exported as jobs.
  drop_if_url_is_index_page: true
  drop_if_title_is_location: true

  # Drop postings where the company matches companies.blacklist.
  drop_if_company_blacklisted: true

location_radius:
  # Enforce a hard 30 km radius for non-remote jobs.
  # target_city, latitude, longitude, and radius_km come from config/intent.yaml at runtime.
  enabled: true

  # true drops jobs outside the radius instead of only lowering their score.
  hard_drop_outside_radius: true

  # Broad locations like "Germany" or "Bavaria" are not enough for non-remote jobs.
  require_location_for_non_remote: true

  # Keep jobs that clearly say remote/homeoffice from Germany.
  allow_remote_if_country_match: true

  # Prevent exploration URLs that visibly point to known out-of-radius cities.
  filter_exploration_urls: true
  drop_urls_with_outside_city: true

  # For URL paths with country/language segments, keep German-market paths and
  # reject obvious foreign-market paths such as /ch/, /at/, /zh_cn/.
  allowed_country_url_segments: [de, de-de, de_de, deutschland, germany]
  blocked_country_url_segments: [at, ch, cn, tw, zh_cn, zh_tw, fr, it, es, nl, pl, cz]

logging:
  # Only two levels are supported:
  #   info  = structured step/result logs
  #   debug = info plus skipped URLs and low-level details
  level: info
  console: true
  file: true

  # Cosmetic truncation for console/file log lines.
  show_urls: true
  max_url_chars: 220
  max_title_chars: 140
  max_notes_chars: 260
